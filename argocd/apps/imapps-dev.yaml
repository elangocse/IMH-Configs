apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: imh-apps-dev
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: imh-app-dev
  source:
    repoURL: https://github.com/elangocse/IMH-Configs.git
    targetRevision: main
    path: charts/myapp
    helm:
      valueFiles:
        - ../../envs/dev/values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true